<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>شيرين</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    overflow-x: hidden;
    background: linear-gradient(135deg, #6a11cb, #2575fc, #ff6a88);
    background-size: 400% 400%;
    animation: bgMove 10s ease infinite;
    color: white;
}

@keyframes bgMove {
    0% {background-position:0% 50%}
    50% {background-position:100% 50%}
    100% {background-position:0% 50%}
}

.container {
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 30px;
}

.message {
    max-width: 900px;
    text-align: center;
    font-size: 28px;
    line-height: 2.3;
    font-weight: bold;
    color: #ffffff;
    text-shadow: 0 0 10px rgba(0,0,0,0.4);
    white-space: pre-line;
}

/* hearts */
.heart {
    position: absolute;
    color: rgba(255,255,255,0.7);
    animation: floatUp 6s linear infinite;
}

@keyframes floatUp {
    0% {transform: translateY(100vh) scale(0.5); opacity: 0;}
    50% {opacity: 1;}
    100% {transform: translateY(-10vh) scale(1.2); opacity: 0;}
}
</style>
</head>

<body>

<audio id="music" loop autoplay>
    <source src="music.mp3" type="audio/mpeg">
</audio>

<div class="container">
    <div class="message" id="text"></div>
</div>

<script>

// النص
const text = `في مقولة تكول:
"أفضل شي بالذكريات هو إنك تصنعها"

فقررت أصنع كلشي بهالبوكس باسمچ يا شيرين

المج حتى تشربين بيه آيس كوفي بدل مج ياسمين

تعليقة للسيارة حتى أشاركچ طريقچ للشغل كل يوم مثل العادة

الفرشة حتى تهتمين بشعرچ ويطول أكثر وما تقصّيه

المراية حتى تبصين لعيونچ وتشوفين شكد هي كلش وهواي جميلة

سجادة الصلاة حتى تظبطين المنبه قبل صلاة الفجر وتتذكرين السحور وتصلين عليها

وأخيراً أتمنى من ربنا دوم تكونين مبسوطة وسعيدة بحياتچ وصحتچ بخير والأهم ناجحة بشغلچ`;

let i = 0;

function typeWriter() {
    if (i < text.length) {
        document.getElementById("text").innerHTML += text.charAt(i);
        i++;
        setTimeout(typeWriter, 45);
    }
}

// تشغيل تلقائي عند فتح الصفحة
window.onload = function () {

    let music = document.getElementById("music");
    music.play().catch(()=>{});

    typeWriter();
    createHearts();

};

// قلوب متحركة
function createHearts() {
    setInterval(() => {
        let heart = document.createElement("div");
        heart.className = "heart";
        heart.innerHTML = "❤";
        heart.style.left = Math.random() * 100 + "vw";
        heart.style.fontSize = (10 + Math.random() * 25) + "px";
        heart.style.animationDuration = (4 + Math.random() * 4) + "s";
        document.body.appendChild(heart);

        setTimeout(() => heart.remove(), 7000);
    }, 300);
}

</script>

</body>
</html>
